  <!-- 체크 장식 (상단 작은 원형) -->
  <circle cx="256" cy="148" r="44" fill="rgba(255,255,255,0.15)"/>
  <text x="256" y="163" text-anchor="middle"
        font-family="Georgia, 'Times New Roman', serif"
        font-size="44" fill="white">✓</text>

  <!-- tasks 텍스트 -->
  <text x="256" y="360"
        text-anchor="middle"
        font-family="Georgia, 'Times New Roman', serif"
        font-size="128"
        font-weight="bold"
